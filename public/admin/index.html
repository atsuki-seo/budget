<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>家計簿 管理画面</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../assets/app.css">
    <script type="module" src="../assets/app.js"></script>
  </head>
  <body data-page="admin">
    <header class="topbar">
      <div>
        <h1 class="brand-heading">
          <img class="brand-icon" src="../favicon.svg" alt="" width="32" height="32">
          <span>家計簿 管理画面</span>
        </h1>
      </div>
      <div class="topbar-actions">
        <button id="transactionsButton" type="button">明細</button>
        <button id="logoutButton" class="secondary" type="button" hidden>ログアウト</button>
      </div>
    </header>

    <main class="layout">
      <section id="adminContent" class="panel" aria-labelledby="importHeading" hidden>
        <div class="section-header table-header">
          <div>
            <h2 id="importHeading">CSV取込</h2>
            <p id="importsResultCount" class="muted">-</p>
          </div>
          <div class="pager">
            <button id="prevImportsPageButton" class="secondary" type="button">前へ</button>
            <button id="nextImportsPageButton" class="secondary" type="button">次へ</button>
          </div>
        </div>
        <form id="importForm" class="stack">
          <input id="csvFile" name="csv" type="file" accept=".csv,text/csv">
          <button type="submit">アップロード</button>
        </form>
        <div class="table-wrap compact">
          <table class="imports-table">
            <thead>
              <tr>
                <th>取込日時</th>
                <th>支払日</th>
                <th>CSV</th>
                <th class="number">件数</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="importsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog id="loginDialog">
      <form id="loginForm" method="dialog" class="dialog-form">
        <h2>ログイン</h2>
        <label>
          <span>パスワード</span>
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <div class="dialog-actions">
          <button class="secondary" id="cancelLoginButton" type="button">キャンセル</button>
          <button type="submit">ログイン</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
