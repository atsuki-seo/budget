<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="せおの家計簿を管理するページ">
    <meta property="og:title" content="せおの家計簿 管理画面">
    <meta property="og:description" content="せおの家計簿を管理するページ">
    <meta property="og:image" content="https://s-atsuki.jp/budget/og-image.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <title>せおの家計簿 管理画面</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../assets/app.css">
    <script type="module" src="../assets/app.js"></script>
  </head>
  <body data-page="admin">
    <header class="topbar">
      <div>
        <h1 class="brand-heading">
          <a class="brand-home-link" href="../" aria-label="家計簿トップへ">
            <img class="brand-icon" src="../favicon.svg" alt="" width="32" height="32">
          </a>
          <span>せおの家計簿 管理画面</span>
        </h1>
      </div>
      <div class="topbar-actions">
        <button id="transactionsButton" type="button">明細</button>
        <button id="logoutButton" class="secondary" type="button" hidden>ログアウト</button>
      </div>
    </header>

    <main class="layout">
      <div id="adminContent" class="admin-stack" hidden>
        <section class="panel" aria-labelledby="manualEntryHeading">
          <div class="section-header">
            <div>
              <h2 id="manualEntryHeading">決済情報の追加</h2>
            </div>
            <button id="openManualDialogButton" type="button">追加</button>
          </div>
          <div class="manual-entry-list" aria-labelledby="manualTransactionsHeading">
            <div class="section-header table-header manual-transactions-header">
              <div>
                <h3 id="manualTransactionsHeading">手入力一覧</h3>
                <p id="manualTransactionsResultCount" class="muted">-</p>
              </div>
              <div class="manual-transactions-controls">
                <div class="segmented manual-list-segmented" role="group" aria-label="手入力一覧の種別">
                  <label>
                    <input type="radio" name="manual_list_transaction_type" value="expense" checked>
                    <span>支出</span>
                  </label>
                  <label>
                    <input type="radio" name="manual_list_transaction_type" value="income">
                    <span>収入</span>
                  </label>
                </div>
                <div class="pager">
                  <button id="prevManualTransactionsPageButton" class="secondary" type="button">前へ</button>
                  <button id="nextManualTransactionsPageButton" class="secondary" type="button">次へ</button>
                </div>
              </div>
            </div>
            <div class="table-wrap compact">
              <table class="manual-transactions-table">
                <thead id="manualTransactionsHead"></thead>
                <tbody id="manualTransactionsBody"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section class="panel" aria-labelledby="importHeading">
          <div class="section-header table-header">
            <div>
              <h2 id="importHeading">決済情報の取り込み</h2>
              <p id="importsResultCount" class="muted">-</p>
            </div>
            <div class="pager">
              <button id="prevImportsPageButton" class="secondary" type="button">前へ</button>
              <button id="nextImportsPageButton" class="secondary" type="button">次へ</button>
            </div>
          </div>
          <form id="importForm" class="stack">
            <input id="csvFile" name="csv" type="file" accept=".csv,text/csv">
            <button id="importSubmitButton" type="submit" disabled>アップロード</button>
          </form>
          <div class="table-wrap compact">
            <table class="imports-table">
              <thead>
                <tr>
                  <th>取込日時</th>
                  <th>支払日</th>
                  <th>データ元</th>
                  <th class="number">件数</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="importsBody"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <dialog id="manualEntryDialog">
      <form id="manualEntryForm" method="dialog" class="dialog-form manual-dialog-form" novalidate>
        <button id="closeManualEntryDialogButton" class="dialog-close" type="button" aria-label="閉じる">☓</button>
        <h2>決済情報の追加</h2>

        <div class="manual-grid">
          <fieldset class="field-group manual-grid-wide">
            <legend>種別</legend>
            <div class="segmented" role="group" aria-label="種別">
              <label>
                <input type="radio" name="transaction_type" value="expense" checked>
                <span>支出</span>
              </label>
              <label>
                <input type="radio" name="transaction_type" value="income">
                <span>収入</span>
              </label>
            </div>
            <p id="manualTransactionTypeError" class="field-error"></p>
          </fieldset>

          <div class="field-group">
            <label for="manualPaymentMethod">
              <span id="manualPaymentMethodLabel">決済方法</span>
              <select id="manualPaymentMethod" name="payment_method" required></select>
            </label>
            <p id="manualPaymentMethodError" class="field-error"></p>
          </div>

          <div class="field-group">
            <label for="manualCardUser">
              <span>利用者</span>
              <select id="manualCardUser" name="card_user" required></select>
            </label>
            <p id="manualCardUserError" class="field-error"></p>
          </div>

          <div class="field-group">
            <label for="manualUsedOn">
              <span id="manualUsedOnLabel">利用日</span>
              <input id="manualUsedOn" name="used_on" type="date" required>
            </label>
            <p id="manualUsedOnError" class="field-error"></p>
          </div>

          <div class="field-group manual-grid-wide">
            <label for="manualMerchant">
              <span id="manualMerchantLabel">店名・商品名</span>
              <input id="manualMerchant" name="merchant" type="text" maxlength="255" autocomplete="off" required>
            </label>
            <p id="manualMerchantError" class="field-error"></p>
          </div>

          <div class="field-group">
            <label for="manualAmount">
              <span>金額</span>
              <input id="manualAmount" name="amount" type="text" inputmode="numeric" autocomplete="off" required>
            </label>
            <p id="manualAmountError" class="field-error"></p>
          </div>

          <div id="manualCardDetails" class="manual-card-details manual-grid-wide">
            <div class="field-group">
              <label for="manualStatementPaymentOn">
                <span>支払日</span>
                <input id="manualStatementPaymentOn" name="statement_payment_on" type="date">
              </label>
              <p id="manualStatementPaymentOnError" class="field-error"></p>
            </div>

            <fieldset class="field-group payment-category-field">
              <legend>支払区分</legend>
              <div class="segmented" role="group" aria-label="支払区分">
                <label>
                  <input type="radio" name="payment_category_mode" value="one_time" checked>
                  <span>1回</span>
                </label>
                <label>
                  <input type="radio" name="payment_category_mode" value="installment">
                  <span>均等</span>
                </label>
              </div>
              <div id="manualInstallmentControls" class="installment-controls" hidden>
                <label for="manualInstallmentCount">
                  <span>分割回数</span>
                  <select id="manualInstallmentCount" name="installment_count"></select>
                </label>
                <label for="manualInstallmentNumber">
                  <span>何回目</span>
                  <select id="manualInstallmentNumber" name="installment_number"></select>
                </label>
              </div>
              <p id="manualPaymentCategoryError" class="field-error"></p>
            </fieldset>
          </div>
        </div>

        <label class="checkbox-line manual-continuous">
          <input id="manualContinue" name="continue" type="checkbox">
          <span>連続して追加</span>
        </label>

        <div class="dialog-actions">
          <button class="secondary" id="cancelManualEntryButton" type="button">キャンセル</button>
          <button type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="transactionDialog">
      <form id="transactionForm" method="dialog" class="dialog-form transaction-dialog-form" novalidate>
        <button id="closeTransactionDialogButton" class="dialog-close" type="button" aria-label="閉じる">☓</button>
        <h2 id="transactionDialogTitle">明細詳細</h2>
        <p id="transactionReadonlyNotice" class="muted" hidden>詳細表示のみです。</p>

        <div class="manual-grid">
          <div class="field-group">
            <label for="transactionStatementPaymentOn">
              <span id="transactionStatementPaymentOnLabel">支払日</span>
              <input id="transactionStatementPaymentOn" name="statement_payment_on" type="date" required>
            </label>
            <p id="transactionStatementPaymentOnError" class="field-error"></p>
          </div>

          <div id="transactionUsedOnGroup" class="field-group">
            <label for="transactionUsedOn">
              <span>利用日</span>
              <input id="transactionUsedOn" name="used_on" type="date">
            </label>
            <p id="transactionUsedOnError" class="field-error"></p>
          </div>

          <div class="field-group manual-grid-wide">
            <label for="transactionMerchant">
              <span id="transactionMerchantLabel">店名・商品名</span>
              <input id="transactionMerchant" name="merchant" type="text" maxlength="255" autocomplete="off" required>
            </label>
            <p id="transactionMerchantError" class="field-error"></p>
          </div>

          <div class="field-group">
            <label for="transactionCardUser">
              <span>利用者</span>
              <select id="transactionCardUser" name="card_user" required></select>
            </label>
            <p id="transactionCardUserError" class="field-error"></p>
          </div>

          <div class="field-group">
            <label for="transactionPaymentMethod">
              <span id="transactionPaymentMethodLabel">決済方法</span>
              <select id="transactionPaymentMethod" name="payment_method" required></select>
            </label>
            <p id="transactionPaymentMethodError" class="field-error"></p>
          </div>

          <div id="transactionPaymentCategoryGroup" class="field-group">
            <label for="transactionPaymentCategory">
              <span>支払区分</span>
              <input id="transactionPaymentCategory" name="payment_category" type="text" maxlength="100" autocomplete="off">
            </label>
            <p id="transactionPaymentCategoryError" class="field-error"></p>
          </div>

          <div class="field-group">
            <label for="transactionBillingAmount">
              <span id="transactionBillingAmountLabel">当月支払</span>
              <input id="transactionBillingAmount" name="billing_amount" type="text" inputmode="numeric" autocomplete="off" required>
            </label>
            <p id="transactionBillingAmountError" class="field-error"></p>
          </div>

          <div id="transactionUsageAmountGroup" class="field-group">
            <label for="transactionUsageAmount">
              <span>利用金額</span>
              <input id="transactionUsageAmount" name="usage_amount" type="text" inputmode="numeric" autocomplete="off">
            </label>
            <p id="transactionUsageAmountError" class="field-error"></p>
          </div>

          <div id="transactionCarriedForwardAmountGroup" class="field-group">
            <label for="transactionCarriedForwardAmount">
              <span>繰越</span>
              <input id="transactionCarriedForwardAmount" name="carried_forward_amount" type="text" inputmode="numeric" autocomplete="off">
            </label>
            <p id="transactionCarriedForwardAmountError" class="field-error"></p>
          </div>

          <div id="transactionAdjustmentAmountGroup" class="field-group">
            <label for="transactionAdjustmentAmount">
              <span>調整</span>
              <input id="transactionAdjustmentAmount" name="adjustment_amount" type="text" inputmode="numeric" autocomplete="off">
            </label>
            <p id="transactionAdjustmentAmountError" class="field-error"></p>
          </div>
        </div>

        <div class="dialog-actions">
          <button class="danger dialog-delete" id="deleteTransactionButton" type="button">削除</button>
          <button class="secondary" id="cancelTransactionButton" type="button">キャンセル</button>
          <button id="saveTransactionButton" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="loginDialog">
      <form id="loginForm" method="dialog" class="dialog-form">
        <button id="closeLoginDialogButton" class="dialog-close" type="button" aria-label="閉じる">☓</button>
        <h2>ログイン</h2>
        <label>
          <span>パスワード</span>
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <div class="dialog-actions">
          <button class="secondary" id="cancelLoginButton" type="button">キャンセル</button>
          <button type="submit">ログイン</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
