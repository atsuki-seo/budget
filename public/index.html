<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="せお家の毎月の出費がひと目でわかるページ">
    <meta property="og:title" content="せお家の家計簿ページ">
    <meta property="og:description" content="せお家の毎月の出費がひと目でわかるページ">
    <title>せお家の家計簿</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/app.css">
    <script type="module" src="assets/app.js"></script>
  </head>
  <body data-page="transactions">
    <div class="transactions-sticky">
      <header class="topbar">
        <div>
          <h1 class="brand-heading">
            <img class="brand-icon" src="favicon.svg" alt="" width="32" height="32">
            <span>せお家の家計簿</span>
          </h1>
        </div>
        <div class="topbar-actions">
          <button id="loginButton" type="button">ログイン</button>
          <button id="adminButton" type="button" hidden>管理</button>
          <button id="logoutButton" class="secondary" type="button" hidden>ログアウト</button>
        </div>
      </header>

      <section class="summary-bar" aria-label="集計条件と合計">
        <form id="filtersForm" class="filters">
          <label for="date_from_month">
            <span>開始月</span>
            <select id="date_from_month" name="date_from_month"></select>
          </label>
          <label for="date_to_month">
            <span>終了月</span>
            <select id="date_to_month" name="date_to_month"></select>
          </label>
          <button id="resetFiltersButton" class="secondary" type="button" hidden>リセット</button>
        </form>
        <div class="summary-total">
          <span>合計</span>
          <strong id="summaryAmount">-</strong>
        </div>
      </section>
    </div>

    <main class="layout">
      <section class="panel" aria-labelledby="transactionsHeading">
        <div class="section-header table-header">
          <div>
            <h2 id="transactionsHeading">明細</h2>
            <p id="resultCount" class="muted">-</p>
          </div>
          <div class="pager">
            <button id="prevPageButton" class="secondary" type="button">前へ</button>
            <button id="nextPageButton" class="secondary" type="button">次へ</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>利用日</th>
                <th>店名</th>
                <th>利用者</th>
                <th>決済方法</th>
                <th>支払区分</th>
                <th class="number">当月支払</th>
                <th class="number">利用金額</th>
                <th class="number">繰越</th>
                <th class="number">調整</th>
                <th>当月お支払日</th>
              </tr>
            </thead>
            <tbody id="transactionsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog id="loginDialog">
      <form id="loginForm" method="dialog" class="dialog-form">
        <h2>ログイン</h2>
        <label>
          <span>パスワード</span>
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <div class="dialog-actions">
          <button class="secondary" id="cancelLoginButton" type="button">キャンセル</button>
          <button type="submit">ログイン</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
