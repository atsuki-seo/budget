<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>家計簿</title>
    <link rel="stylesheet" href="assets/app.css">
    <script type="module" src="assets/app.js"></script>
  </head>
  <body data-page="transactions">
    <header class="topbar">
      <div>
        <h1>家計簿</h1>
      </div>
      <div class="topbar-actions">
        <button id="loginButton" type="button">ログイン</button>
        <button id="adminButton" class="secondary" type="button" hidden>管理画面</button>
        <button id="logoutButton" class="secondary" type="button" hidden>ログアウト</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel" aria-labelledby="filtersHeading">
        <div class="section-header filters-header">
          <h2 id="filtersHeading">検索条件</h2>
          <div class="filters-actions">
            <button id="filtersToggleButton" class="secondary filter-toggle" type="button" aria-expanded="true" aria-controls="filtersForm">条件を隠す</button>
            <button id="resetFiltersButton" class="secondary" type="button" hidden>リセット</button>
          </div>
        </div>
        <form id="filtersForm" class="filters">
          <label>
            <span>開始月</span>
            <select name="date_from_month"></select>
          </label>
          <label>
            <span>終了月</span>
            <select name="date_to_month"></select>
          </label>
        </form>
      </section>

      <section class="summary-grid" aria-label="集計">
        <div class="metric">
          <span class="metric-label">合計</span>
          <strong id="summaryAmount">-</strong>
        </div>
      </section>

      <section class="panel" aria-labelledby="transactionsHeading">
        <div class="section-header table-header">
          <div>
            <h2 id="transactionsHeading">明細</h2>
            <p id="resultCount" class="muted">-</p>
          </div>
          <div class="pager">
            <button id="prevPageButton" class="secondary" type="button">前へ</button>
            <button id="nextPageButton" class="secondary" type="button">次へ</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>利用日</th>
                <th>店名</th>
                <th>利用者</th>
                <th>決済方法</th>
                <th>支払区分</th>
                <th class="number">利用金額</th>
                <th class="number">手数料</th>
                <th class="number">支払総額</th>
                <th class="number">当月支払</th>
                <th class="number">繰越</th>
                <th class="number">調整</th>
                <th>当月お支払日</th>
                <th>計上日</th>
                <th class="number">計上額</th>
              </tr>
            </thead>
            <tbody id="transactionsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog id="loginDialog">
      <form id="loginForm" method="dialog" class="dialog-form">
        <h2>ログイン</h2>
        <label>
          <span>パスワード</span>
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <div class="dialog-actions">
          <button class="secondary" id="cancelLoginButton" type="button">キャンセル</button>
          <button type="submit">ログイン</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
