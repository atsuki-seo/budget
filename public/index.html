<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="せおの毎月の出費がひと目でわかるページ">
    <meta property="og:title" content="せおの家計簿ページ">
    <meta property="og:description" content="せおの毎月の出費がひと目でわかるページ">
    <meta property="og:image" content="https://s-atsuki.jp/budget/og-image.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <title>せおの家計簿</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/app.css">
    <script type="module" src="assets/app.js"></script>
  </head>
  <body data-page="transactions">
    <div class="transactions-sticky">
      <header class="topbar">
        <div>
          <h1 class="brand-heading">
            <a class="brand-home-link" href="./" aria-label="家計簿トップへ">
              <img class="brand-icon" src="favicon.svg" alt="" width="32" height="32">
            </a>
            <span>せおの家計簿</span>
          </h1>
        </div>
        <div class="topbar-actions">
          <button id="loginButton" type="button">ログイン</button>
          <button id="adminButton" type="button" hidden>管理</button>
          <button id="logoutButton" class="secondary" type="button" hidden>ログアウト</button>
        </div>
      </header>

      <section class="summary-bar" aria-label="集計条件と合計">
        <form id="filtersForm" class="filters">
          <label for="date_from_month">
            <span>開始月</span>
            <select id="date_from_month" name="date_from_month"></select>
          </label>
          <label for="date_to_month">
            <span>終了月</span>
            <select id="date_to_month" name="date_to_month"></select>
          </label>
        </form>
        <div class="summary-totals" aria-label="合計">
          <div class="summary-total income-total">
            <span>収入合計</span>
            <strong id="summaryIncomeAmount">-</strong>
          </div>
          <div class="summary-total expense-total">
            <span>支出合計</span>
            <strong id="summaryExpenseAmount">-</strong>
          </div>
        </div>
        <button id="resetFiltersButton" class="secondary" type="button" hidden>リセット</button>
      </section>
    </div>

    <main class="layout">
      <section class="panel" aria-labelledby="incomeTransactionsHeading">
        <div class="section-header table-header">
          <div>
            <h2 id="incomeTransactionsHeading">収入明細</h2>
            <p id="incomeResultCount" class="muted">-</p>
          </div>
          <div class="table-header-actions" aria-label="収入明細の表フィルター">
            <div class="table-filter-shortcuts">
              <button class="table-filter-chip" type="button" data-table-filter-trigger data-filter-group="income" data-filter-key="payment_method" aria-haspopup="true" aria-expanded="false">受取方法</button>
            </div>
            <button id="incomeTableFiltersResetButton" class="secondary table-filter-reset" type="button" data-table-filter-reset="income" hidden>リセット</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>受取日</th>
                <th>摘要</th>
                <th><button class="table-heading-filter" type="button" data-table-filter-trigger data-filter-group="income" data-filter-key="payment_method" aria-haspopup="true" aria-expanded="false">受取方法</button></th>
                <th class="number">金額</th>
              </tr>
            </thead>
            <tbody id="incomeTransactionsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel" aria-labelledby="expenseTransactionsHeading">
        <div class="section-header table-header">
          <div>
            <h2 id="expenseTransactionsHeading">支出明細</h2>
            <p id="expenseResultCount" class="muted">-</p>
          </div>
          <div class="table-header-actions" aria-label="支出明細の表フィルター">
            <div class="table-filter-shortcuts">
              <button class="table-filter-chip" type="button" data-table-filter-trigger data-filter-group="expense" data-filter-key="card_user" aria-haspopup="true" aria-expanded="false">利用者</button>
              <button class="table-filter-chip" type="button" data-table-filter-trigger data-filter-group="expense" data-filter-key="payment_method" aria-haspopup="true" aria-expanded="false">決済方法</button>
              <button class="table-filter-chip" type="button" data-table-filter-trigger data-filter-group="expense" data-filter-key="payment_category" aria-haspopup="true" aria-expanded="false">支払区分</button>
            </div>
            <button id="expenseTableFiltersResetButton" class="secondary table-filter-reset" type="button" data-table-filter-reset="expense" hidden>リセット</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>支払日</th>
                <th>店名</th>
                <th><button class="table-heading-filter" type="button" data-table-filter-trigger data-filter-group="expense" data-filter-key="card_user" aria-haspopup="true" aria-expanded="false">利用者</button></th>
                <th><button class="table-heading-filter" type="button" data-table-filter-trigger data-filter-group="expense" data-filter-key="payment_method" aria-haspopup="true" aria-expanded="false">決済方法</button></th>
                <th><button class="table-heading-filter" type="button" data-table-filter-trigger data-filter-group="expense" data-filter-key="payment_category" aria-haspopup="true" aria-expanded="false">支払区分</button></th>
                <th class="number">当月支払</th>
                <th class="number">利用金額</th>
                <th class="number">繰越</th>
                <th class="number">調整</th>
              </tr>
            </thead>
            <tbody id="expenseTransactionsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog id="transactionDialog">
      <form id="transactionForm" method="dialog" class="dialog-form transaction-dialog-form" novalidate>
        <button id="closeTransactionDialogButton" class="dialog-close" type="button" aria-label="閉じる">☓</button>
        <h2 id="transactionDialogTitle">明細詳細</h2>
        <p id="transactionReadonlyNotice" class="muted" hidden>詳細表示のみです。ログイン中のみ保存できます。</p>

        <div class="manual-grid">
          <div class="field-group">
            <label for="transactionStatementPaymentOn">
              <span id="transactionStatementPaymentOnLabel">支払日</span>
              <input id="transactionStatementPaymentOn" name="statement_payment_on" type="date" required>
            </label>
            <p id="transactionStatementPaymentOnError" class="field-error"></p>
          </div>

          <div id="transactionUsedOnGroup" class="field-group">
            <label for="transactionUsedOn">
              <span>利用日</span>
              <input id="transactionUsedOn" name="used_on" type="date">
            </label>
            <p id="transactionUsedOnError" class="field-error"></p>
          </div>

          <div class="field-group manual-grid-wide">
            <label for="transactionMerchant">
              <span id="transactionMerchantLabel">店名・商品名</span>
              <input id="transactionMerchant" name="merchant" type="text" maxlength="255" autocomplete="off" required>
            </label>
            <p id="transactionMerchantError" class="field-error"></p>
          </div>

          <div class="field-group">
            <label for="transactionCardUser">
              <span>利用者</span>
              <select id="transactionCardUser" name="card_user" required></select>
            </label>
            <p id="transactionCardUserError" class="field-error"></p>
          </div>

          <div class="field-group">
            <label for="transactionPaymentMethod">
              <span id="transactionPaymentMethodLabel">決済方法</span>
              <select id="transactionPaymentMethod" name="payment_method" required></select>
            </label>
            <p id="transactionPaymentMethodError" class="field-error"></p>
          </div>

          <div id="transactionPaymentCategoryGroup" class="field-group">
            <label for="transactionPaymentCategory">
              <span>支払区分</span>
              <input id="transactionPaymentCategory" name="payment_category" type="text" maxlength="100" autocomplete="off">
            </label>
            <p id="transactionPaymentCategoryError" class="field-error"></p>
          </div>

          <div class="field-group">
            <label for="transactionBillingAmount">
              <span id="transactionBillingAmountLabel">当月支払</span>
              <input id="transactionBillingAmount" name="billing_amount" type="text" inputmode="numeric" autocomplete="off" required>
            </label>
            <p id="transactionBillingAmountError" class="field-error"></p>
          </div>

          <div id="transactionUsageAmountGroup" class="field-group">
            <label for="transactionUsageAmount">
              <span>利用金額</span>
              <input id="transactionUsageAmount" name="usage_amount" type="text" inputmode="numeric" autocomplete="off">
            </label>
            <p id="transactionUsageAmountError" class="field-error"></p>
          </div>

          <div id="transactionCarriedForwardAmountGroup" class="field-group">
            <label for="transactionCarriedForwardAmount">
              <span>繰越</span>
              <input id="transactionCarriedForwardAmount" name="carried_forward_amount" type="text" inputmode="numeric" autocomplete="off">
            </label>
            <p id="transactionCarriedForwardAmountError" class="field-error"></p>
          </div>

          <div id="transactionAdjustmentAmountGroup" class="field-group">
            <label for="transactionAdjustmentAmount">
              <span>調整</span>
              <input id="transactionAdjustmentAmount" name="adjustment_amount" type="text" inputmode="numeric" autocomplete="off">
            </label>
            <p id="transactionAdjustmentAmountError" class="field-error"></p>
          </div>
        </div>

        <div class="dialog-actions">
          <button class="secondary" id="cancelTransactionButton" type="button">閉じる</button>
          <button id="saveTransactionButton" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="loginDialog">
      <form id="loginForm" method="dialog" class="dialog-form">
        <button id="closeLoginDialogButton" class="dialog-close" type="button" aria-label="閉じる">☓</button>
        <h2>ログイン</h2>
        <label>
          <span>パスワード</span>
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <div class="dialog-actions">
          <button class="secondary" id="cancelLoginButton" type="button">キャンセル</button>
          <button type="submit">ログイン</button>
        </div>
      </form>
    </dialog>

    <div id="tableFilterMenu" class="table-filter-menu" hidden></div>
    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
